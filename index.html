  .stat-value { font-size: 26px; font-weight: 600; color: var(--text); }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--orange); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.accent { font-size: 18px; color: var(--accent); }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; }

  td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; font-size: 13px; }

async function fetchICL(){
  try {
    // BCRA API - Variable 14 = ICL (Índice para Contratos de Locación)
    const res = await fetch("https://api.bcra.gob.ar/estadisticas/v3.0/monetarias/14/datos?limit=2", {
      headers: {"Accept": "application/json"}
    });
    if(!res.ok) throw new Error("Sin respuesta");
    const data = await res.json();
    const registros = data.results || data.data || [];
    if(registros.length < 2) throw new Error("Datos insuficientes");
    // El ICL acumulado: valor actual / valor anterior
    const ultimo = registros[0].valor || registros[0].v;
    const anterior = registros[1].valor || registros[1].v;
    return { icl: (ultimo / anterior), fecha: registros[0].fecha || registros[0].d, raw: { ultimo, anterior } };
  } catch(e) {
    return null;
  }
}

function getAjustesHoy(){
  const hoy = new Date();
  const dd = String(hoy.getDate()).padStart(2,"0");
  const mm = String(hoy.getMonth()+1).padStart(2,"0");
  return props.filter(p => {
    if(!p.alquilado || !p.ajuste || !p.ini_contrato) return false;
    const ajuste = p.ajuste.toLowerCase();
    if(!ajuste.includes("icl") && !ajuste.includes("cuatrimestral") && !ajuste.includes("trimestral") && !ajuste.includes("semestral")) return false;
    // Verificar si hoy corresponde ajuste basado en mes de inicio
    const [dIni, mIni] = p.ini_contrato.split("/");
    const diaAjuste = dIni;
    if(dd !== diaAjuste) return false;
    const mesActual = hoy.getMonth()+1;
    const mesInicio = parseInt(mIni);
    const diff = (mesActual - mesInicio + 12) % 12;
    if(ajuste.includes("cuatrimestral")) return diff % 4 === 0 && diff > 0;
    if(ajuste.includes("trimestral")) return diff % 3 === 0 && diff > 0;
    if(ajuste.includes("semestral")) return diff % 6 === 0 && diff > 0;
    return false;
  });
}

function previewICL(propData){
  const icl = parseFloat(document.getElementById("icl-manual")?.value);
  const preview = document.getElementById("icl-preview");
  const btn = document.getElementById("btn-aplicar-icl");
  if(!icl || icl <= 0){
    if(preview) preview.innerHTML = "";
    if(btn){ btn.disabled = true; btn.style.opacity = ".4"; }
    return;
  }
  const html = propData.map(p => {
    const nuevo = Math.round(p.alq * icl);
    const diff = nuevo - p.alq;
    return `<div style="background:var(--bg);border-radius:6px;padding:9px 12px;margin-bottom:6px;font-size:12px">
      <span style="color:var(--text-2)">$${Number(p.alq).toLocaleString("es-AR")}</span>
      <span style="margin:0 6px;color:var(--text-3)">→</span>
      <strong style="color:var(--green)">$${nuevo.toLocaleString("es-AR")}</strong>
      <span style="color:var(--text-3);margin-left:6px">(+$${diff.toLocaleString("es-AR")})</span>
    </div>`;
  }).join("");
  if(preview) preview.innerHTML = html;
  if(btn){ btn.disabled = false; btn.style.opacity = "1"; btn.dataset.icl = icl; }
}

async function aplicarICLManual(ids){
  const btn = document.getElementById("btn-aplicar-icl");
  const icl = parseFloat(btn?.dataset.icl);
  if(!icl) return;
  if(!confirm(`¿Aplicar ajuste ICL ${icl} a ${ids.length} propiedad${ids.length!==1?"es":""}?`)) return;
  document.querySelector("div[style*='position:fixed'][style*='z-index:999']")?.remove();
  await aplicarTodosAjustes(ids, icl);
}

async function aplicarTodosAjustes(ids, icl){
  document.querySelector("div[style*='position:fixed'][style*='z-index:999']")?.remove();
  let aplicados = 0;
  for(const id of ids){
    const p = props.find(x => x.id === id);
    if(!p) continue;
    const nuevoValor = Math.round(p.alq_mensual * icl);
    await db.from("propiedades").update({alq_mensual: nuevoValor}).eq("id", id);
    await db.from("historial_precios").insert({
      propiedad_id: id, tipo_precio: "alquiler",
      valor_anterior: p.alq_mensual, valor_nuevo: nuevoValor
    });
    aplicados++;
  }
  const { data: fresh } = await db.from("propiedades").select("*").order("id");
  if(fresh) props = fresh;
  showToast(`${aplicados} alquiler${aplicados!==1?"es":""} actualizado${aplicados!==1?"s":""} ✓`);
  renderMain();
}

    if(error) throw error;
    if(data.length === 0){
      document.getElementById("main").innerHTML = '<div class="loading"><div class="spinner"></div><span>Cargando 26 propiedades por primera vez...</span></div>';
      const { error: e2 } = await db.from("propiedades").insert(SEED);
      if(e2) throw e2;
      const { data: d2 } = await db.from("propiedades").select("*").order("id");
      props = d2;
    } else { props = data; }
    document.getElementById("db-dot").className = "db-dot";
    document.getElementById("db-label").textContent = "Supabase conectado";
    updateAlertBadge();
    renderMain();
    checkAjustesAutomaticos();
  } catch(e) {
    document.getElementById("db-dot").className = "db-dot err";
    document.getElementById("db-label").textContent = "Error de conexión";
    document.getElementById("main").innerHTML = `<div class="loading"><span style="color:var(--red)">❌ ${e.message}</span></div>`;
  }
}

function setView(v){

  } else {

const SIT_ORDER = {"Vacía":0,"Habitada":1,"Alquilada":2};

function parseFecha(str){
  if(!str) return Infinity;
  const parts = str.split("/");
  if(parts.length !== 3) return Infinity;
  return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`).getTime() || Infinity;
}

function filtered(){
  let list = currentView === "alquiladas" ? props.filter(p => p.alquilado) : props;
  return list.filter(p => {
    const s = search.toLowerCase();
    const ms = !s || (p.direccion + p.barrio + (p.inquilino||"") + (p.observaciones||"")).toLowerCase().includes(s);
    return ms && (!fTipo || p.tipo === fTipo) && (!fSit || p.situacion === fSit);
  }).sort((a,b) => {
    const sitDiff = (SIT_ORDER[a.situacion]??9) - (SIT_ORDER[b.situacion]??9);
    if(sitDiff !== 0) return sitDiff;
    return parseFecha(a.fin_contrato) - parseFecha(b.fin_contrato);
  });
}

function getAlertas(){
  const now = Date.now();
  const day = 86400000;
  return props
    .filter(p => p.alquilado && p.fin_contrato)
    .map(p => {
      const fin = parseFecha(p.fin_contrato);
      const dias = Math.round((fin - now) / day);
      return {...p, diasRestantes: dias};
    })
    .filter(p => p.diasRestantes <= 60 && p.diasRestantes >= 0)
    .sort((a,b) => a.diasRestantes - b.diasRestantes);
}

function updateAlertBadge(){
  const alertas = getAlertas();
  const badge = document.getElementById("alert-count");
  if(!badge) return;
  if(alertas.length > 0){
    badge.textContent = alertas.length;
    badge.style.display = "inline";
  } else {
    badge.style.display = "none";
  }
}

function renderAlertas(){
  const alertas = getAlertas();
  const urgentes = alertas.filter(p => p.diasRestantes <= 30);
  const advertencias = alertas.filter(p => p.diasRestantes > 30);

  if(alertas.length === 0){
    return `<div class="app">

  const renderCards = (list, tipo) => list.map(p => `

        <div class="alert-dir">${p.direccion}</div>

        <div class="alert-days-num ${tipo}">${p.diasRestantes}</div>

      </div>
    </div>`).join("");

  return `<div class="app">
    <div class="page-header">
      <h2>Alertas de Vencimiento</h2>
      <p>Contratos que vencen en los próximos 60 días</p>
    </div>

async function cargarFotos(propId){
  const section = document.getElementById(`fotos-section-${propId}`);
  if(!section) return;
  try {
    const { data, error } = await db.storage.from("propiedades-fotos").list(`prop-${propId}/`);
    if(error || !data || data.length === 0){ section.innerHTML = ""; return; }
    const fotos = data.filter(f => f.name && f.name !== ".emptyFolderPlaceholder");
    if(fotos.length === 0){ section.innerHTML = ""; return; }
    const urls = fotos.map(f => {
      const { data: urlData } = db.storage.from("propiedades-fotos").getPublicUrl(`prop-${propId}/${f.name}`);
      return { url: urlData.publicUrl, name: f.name };
    });
    section.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">
        ${urls.map(f => `
          <div style="position:relative;aspect-ratio:4/3">
            <img src="${f.url}" style="width:100%;height:100%;object-fit:cover;border-radius:6px;cursor:pointer" onclick="verFoto('${f.url}')">
            <button onclick="eliminarFoto(${propId},'${f.name}')" style="position:absolute;top:3px;right:3px;background:rgba(0,0,0,.5);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;line-height:1">✕</button>
          </div>`).join("")}
      </div>`;
  } catch(e){ section.innerHTML = ""; }
}

async function subirFotos(event, propId){
  const files = event.target.files;
  if(!files || files.length === 0) return;
  const status = document.getElementById(`fotos-status-${propId}`);
  if(status) status.textContent = "Subiendo...";
  for(const file of files){
    const nombre = `${Date.now()}-${file.name.replace(/[^a-zA-Z0-9.]/g,"_")}`;
    await db.storage.from("propiedades-fotos").upload(`prop-${propId}/${nombre}`, file);
  }
  if(status) status.textContent = `${files.length} foto${files.length!==1?"s":""} subida${files.length!==1?"s":""}`;
  setTimeout(() => { if(status) status.textContent = ""; }, 2000);
  cargarFotos(propId);
}

async function eliminarFoto(propId, nombre){
  if(!confirm("¿Eliminar esta foto?")) return;
  await db.storage.from("propiedades-fotos").remove([`prop-${propId}/${nombre}`]);
  cargarFotos(propId);
}

function verFoto(url){
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:1000;cursor:pointer";
  overlay.innerHTML = `<img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain">`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
}

function g(id){ const el=document.getElementById(id); return el ? el.value : ""; }

function closePanel(){
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

async function deleteProp(id){
  if(!confirm("¿Eliminar esta propiedad?")) return;
  const { error } = await db.from("propiedades").delete().eq("id", id);
  if(error){ showToast("Error: " + error.message); return; }
  props = props.filter(p => p.id !== id);
  closePanel(); showToast("Propiedad eliminada ✓"); renderMain();
}

async function saveProp(){
  const dir = g("f-dir"); const precio = g("f-precio");
  if(!dir || !precio){ alert("Dirección y precio son obligatorios."); return; }
  const sit = g("sit-select") || form.situacion;
  const p = {
    tipo: g("f-tipo")||form.tipo,
    barrio: g("f-barrio")||form.barrio,
    direccion: dir,
    precio: Number(precio)||0,
    moneda: "USD",
    expensas: Number(g("f-expensas"))||0,
    sup_total: Number(g("f-suptotal"))||0,
    sup_cubierta: Number(g("f-supcub"))||0,
    sup_terreno: Number(g("f-supter"))||0,
    ambientes: Number(g("f-amb"))||0,
    dormitorios: Number(g("f-dorm"))||0,
    baños: Number(g("f-banos"))||0,
    antiguedad: g("f-antig"),
    condicion: g("f-cond"),
    disposicion: g("f-disp"),
    situacion: sit,
    apto_credito: g("f-apto"),
    fin_permuta: g("f-finperm"),
    alquilado: sit === "Alquilada",
    ini_contrato: g("f-ini")||"",
    fin_contrato: g("f-fin")||"",
    alq_mensual: Number(g("f-alqmens"))||0,
    ajuste: g("f-ajuste")||"",
    observaciones: g("f-obs"),
    inquilino: g("f-inquilino")||"",
    telefono: g("f-telefono")||"",
    mail: g("f-mail")||"",
    valor_inicial: Number(g("f-valinicial"))||0,
    propietario: g("f-prop")||"",
    tel_propietario: g("f-telprop")||"",
    mail_propietario: g("f-mailprop")||""
  };
  if(panelId){
    // Buscar propiedad original para comparar precios
    const original = props.find(x => x.id === panelId);
    const historial = [];
    if(original){
      if(original.precio !== p.precio){
        historial.push({propiedad_id: panelId, tipo_precio: 'venta', valor_anterior: original.precio, valor_nuevo: p.precio});
      }
      if(original.alq_mensual !== p.alq_mensual && p.alq_mensual > 0){
        historial.push({propiedad_id: panelId, tipo_precio: 'alquiler', valor_anterior: original.alq_mensual, valor_nuevo: p.alq_mensual});
      }
    }
    const { error } = await db.from("propiedades").update(p).eq("id", panelId);
    if(error){ showToast("Error: " + error.message); return; }
    // Guardar historial si hubo cambios
    if(historial.length > 0){
      await db.from("historial_precios").insert(historial);
    }
    showToast("Propiedad actualizada ✓");
  } else {
    const { error } = await db.from("propiedades").insert(p).select().single();
    if(error){ showToast("Error: " + error.message); return; }
    showToast("Propiedad guardada ✓");
  }
  const { data: fresh } = await db.from("propiedades").select("*").order("id");
  if(fresh) props = fresh;
  closePanel(); renderMain();
}

async function renderHistorialPanel(propId){
  try {
    const { data: hist, error } = await db.from("historial_precios")
      .select("*").eq("propiedad_id", propId).order("fecha", {ascending: false});
    if(error) throw error;
    if(!hist || hist.length === 0){
      return `<div style="padding:20px;color:var(--text-3);font-size:13px;text-align:center">Sin cambios de precio registrados aún.<br><small>Los cambios se registran automáticamente al editar.</small></div>`;
    }
    return hist.map(h => {
      const fecha = new Date(h.fecha).toLocaleDateString("es-AR", {day:"2-digit",month:"2-digit",year:"numeric", hour:"2-digit", minute:"2-digit"});
      const tipo = h.tipo_precio === "venta" ? "💰 Precio venta" : "📋 Alquiler mensual";
      const moneda = h.tipo_precio === "venta" ? "USD " : "$";
      const ant = moneda + Number(h.valor_anterior).toLocaleString("es-AR");
      const nuevo = moneda + Number(h.valor_nuevo).toLocaleString("es-AR");
      const subio = h.valor_nuevo > h.valor_anterior;
      return `<div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:12px;font-weight:500;margin-bottom:3px">${tipo}</div>
          <div style="font-size:11px;color:var(--text-3)">${fecha}</div>
        </div>
        <div style="text-align:right;font-size:12px">
          <div style="color:var(--text-3);text-decoration:line-through">${ant}</div>
          <div style="font-weight:600;color:${subio?"var(--green)":"var(--red)"}">${subio?"↑":"↓"} ${nuevo}</div>
        </div>
      </div>`;
    }).join("");
  } catch(e) {
    return `<div style="padding:20px;color:var(--red);font-size:12px">Error al cargar historial: ${e.message}</div>`;
  }
}

function calcularAjuste(propId, alqActual){
  const tipo = document.getElementById(`calc-tipo-${propId}`)?.value;
  const val = parseFloat(document.getElementById(`calc-val-${propId}`)?.value);
  const inputWrap = document.getElementById(`calc-input-wrap-${propId}`);
  const resultado = document.getElementById(`calc-resultado-${propId}`);
  const nuevo = document.getElementById(`calc-nuevo-${propId}`);
  const diff = document.getElementById(`calc-diff-${propId}`);
  const btn = document.getElementById(`calc-btn-${propId}`);

  // Actualizar label según tipo
  if(inputWrap){
    const label = inputWrap.querySelector("label");
    const input = inputWrap.querySelector("input");
    if(tipo === "icl"){
      if(label) label.textContent = "Valor ICL";
      if(input) input.placeholder = "Ej: 1.35";
    } else {
      if(label) label.textContent = "Porcentaje (%)";
      if(input) input.placeholder = "Ej: 30";
    }
  }

  if(!val || val <= 0){ 
    if(resultado) resultado.style.display = "none";
    if(btn) btn.style.display = "none";
    return; 
  }

  let nuevoValor;
  if(tipo === "icl"){
    nuevoValor = Math.round(alqActual * val);
  } else {
    nuevoValor = Math.round(alqActual * (1 + val/100));
  }

  const diferencia = nuevoValor - alqActual;
  const pct = ((diferencia / alqActual) * 100).toFixed(1);

  if(nuevo) nuevo.textContent = "$" + nuevoValor.toLocaleString("es-AR");
  if(diff) diff.textContent = `+ $${diferencia.toLocaleString("es-AR")} (${pct}% de aumento)`;
  if(resultado) resultado.style.display = "block";
  if(btn){ btn.style.display = "block"; btn.dataset.nuevo = nuevoValor; }
}

async function aplicarAjuste(propId){
  const btn = document.getElementById(`calc-btn-${propId}`);
  const nuevoValor = Number(btn?.dataset.nuevo);
  if(!nuevoValor) return;
  if(!confirm(`¿Confirmar nuevo alquiler de $${nuevoValor.toLocaleString("es-AR")}/mes?`)) return;

  const original = props.find(x => x.id === propId);
  const { error } = await db.from("propiedades").update({alq_mensual: nuevoValor}).eq("id", propId);
  if(error){ showToast("Error: " + error.message); return; }

  // Guardar en historial
  await db.from("historial_precios").insert({
    propiedad_id: propId,
    tipo_precio: "alquiler",
    valor_anterior: original.alq_mensual,
    valor_nuevo: nuevoValor
  });

  const { data: fresh } = await db.from("propiedades").select("*").order("id");
  if(fresh) props = fresh;
  showToast("Alquiler actualizado ✓");
  openDetail(propId);
}

async function toggleHistorial(propId){
  const section = document.getElementById("historial-section");
  if(!section) return;
  if(section.innerHTML !== ""){
    section.innerHTML = "";
    return;
  }
  section.innerHTML = `<div style="padding:16px;color:var(--text-3);font-size:12px">Cargando historial...</div>`;
  const html = await renderHistorialPanel(propId);
  section.innerHTML = `
    <div style="padding:14px 16px 8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3)">Historial de precios</div>
    ${html}`;
}

function changeSit(val){
  form.situacion = val;
  form.alquilado = val === "Alquilada";
  const inqSection = document.getElementById("inq-section");
  if(inqSection) inqSection.innerHTML = val === "Alquilada" ? inquilinoFields() : "";
}

function inquilinoFields(){
  return `
  <div class="form-field full" style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px"><label style="color:var(--text);font-weight:500">Datos del inquilino</label></div>
  <div class="form-field"><label>Inquilino</label><input id="f-inquilino" value="${form.inquilino||''}"></div>
  <div class="form-field"><label>Teléfono</label><input id="f-telefono" value="${form.telefono||''}"></div>
  <div class="form-field full"><label>Mail</label><input id="f-mail" value="${form.mail||''}"></div>
  <div class="form-field"><label>Inicio contrato</label><input id="f-ini" value="${form.ini_contrato||''}" placeholder="DD/MM/AAAA"></div>
  <div class="form-field"><label>Fin contrato</label><input id="f-fin" value="${form.fin_contrato||''}" placeholder="DD/MM/AAAA"></div>
  <div class="form-field"><label>Alquiler mensual (ARS)</label><input id="f-alqmens" type="number" value="${form.alq_mensual||''}"></div>
  <div class="form-field"><label>Ajuste</label><input id="f-ajuste" value="${form.ajuste||''}" placeholder="Cuatrimestral ICL"></div>
  <div class="form-field"><label>Valor inicial (ARS)</label><input id="f-valinicial" type="number" value="${form.valor_inicial||''}"></div>`;
}

const PWD = "Jotainm";

function checkPwd(){
  const val = document.getElementById("pwd-input").value;
  if(val === PWD){
    sessionStorage.setItem("jota_auth","1");
    document.getElementById("login-wrap").style.display = "none";
    init();
  } else {
    document.getElementById("login-error").textContent = "Contraseña incorrecta";
    document.getElementById("pwd-input").value = "";
    document.getElementById("pwd-input").focus();
  }
}

// Verificar si ya está autenticado
if(sessionStorage.getItem("jota_auth") === "1"){
  document.getElementById("login-wrap").style.display = "none";
  init();
}
</script>
